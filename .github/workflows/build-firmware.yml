# =============================================================================
# .github/workflows/build-firmware.yml
#
# Builds the sigrok-pico ADS1256 firmware and publishes a GitHub Release.
#
# Triggers:
#   • Push a tag like "v1.2.3"  → full build (all boards × all modes) + release
#   • Pull request to main      → build-only CI check (all boards × all modes)
#   • Manual workflow_dispatch  → build + release with optional filtering
#
# Matrix: pico_board × pico_mode = up to 9 parallel jobs
#   pico_board : pico | pico_w | pico2
#   pico_mode  : 0 (baseline 21D+3A) | 1 (digital-26) | 2 (digital-32)
# =============================================================================

name: Build & Release Firmware

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.1"
      pico_board:
        description: "PICO_BOARD target ('all' builds all boards)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - pico
          - pico_w
          - pico2
      pico_mode:
        description: "PICO_MODE ('all' builds all modes: 0=baseline 1=dig26 2=dig32)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - "0"
          - "1"
          - "2"
      pico_sdk_version:
        description: "Pico SDK version tag"
        required: false
        default: "2.1.0"
      draft_release:
        description: "Publish as draft release?"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PICO_SDK_VERSION: ${{ github.event.inputs.pico_sdk_version || '2.1.0' }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build firmware (matrix: board × mode)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.pico_board }}, mode${{ matrix.pico_mode }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        pico_board:
          - pico
          - pico_w
          - pico2
        pico_mode:
          - "0"
          - "1"
          - "2"
        exclude:
          # Filter boards when a single board is selected via workflow_dispatch
          - pico_board: ${{ (github.event.inputs.pico_board != 'all' && github.event.inputs.pico_board != 'pico'   && github.event.inputs.pico_board != '') && 'pico'   || '' }}
          - pico_board: ${{ (github.event.inputs.pico_board != 'all' && github.event.inputs.pico_board != 'pico_w' && github.event.inputs.pico_board != '') && 'pico_w' || '' }}
          - pico_board: ${{ (github.event.inputs.pico_board != 'all' && github.event.inputs.pico_board != 'pico2'  && github.event.inputs.pico_board != '') && 'pico2'  || '' }}
          # Filter modes when a single mode is selected via workflow_dispatch
          - pico_mode: ${{ (github.event.inputs.pico_mode != 'all' && github.event.inputs.pico_mode != '0' && github.event.inputs.pico_mode != '') && '0' || '' }}
          - pico_mode: ${{ (github.event.inputs.pico_mode != 'all' && github.event.inputs.pico_mode != '1' && github.event.inputs.pico_mode != '') && '1' || '' }}
          - pico_mode: ${{ (github.event.inputs.pico_mode != 'all' && github.event.inputs.pico_mode != '2' && github.event.inputs.pico_mode != '') && '2' || '' }}

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout firmware source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Pico SDK
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: pico-sdk-cache
        with:
          path: pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      - name: Cache Pico SDK submodules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: pico-sdk/lib
          key: pico-sdk-submodules-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      - name: Checkout Pico SDK ${{ env.PICO_SDK_VERSION }}
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: raspberrypi/pico-sdk
          ref: ${{ env.PICO_SDK_VERSION }}
          path: pico-sdk
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize Pico SDK submodules
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: cd pico-sdk && git submodule update --init --recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            build-essential \
            python3

      - name: Verify ARM toolchain
        run: arm-none-eabi-gcc --version

      - name: Copy pico_sdk_import.cmake
        run: |
          cp pico-sdk/external/pico_sdk_import.cmake \
             pico_sdk_sigrok/pico_sdk_import.cmake

      - name: Resolve build metadata and filenames
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          BOARD="${{ matrix.pico_board }}"
          MODE="${{ matrix.pico_mode }}"
          DATE=$(date -u +'%Y-%m-%d')

          BASE="sigrok-pico-${VERSION}-${BOARD}-${DATE}"
          UF2_NAME="${BASE}.uf2"
          ELF_NAME="${BASE}.elf"

          echo "version=${VERSION}"        >> "$GITHUB_OUTPUT"
          echo "artifact_name=${BASE}"     >> "$GITHUB_OUTPUT"
          echo "uf2_name=${UF2_NAME}"      >> "$GITHUB_OUTPUT"
          echo "elf_name=${ELF_NAME}"      >> "$GITHUB_OUTPUT"

          echo "Version  : ${VERSION}"
          echo "Board    : ${BOARD}"
          echo "Mode     : ${MODE}"
          echo "UF2 file : ${UF2_NAME}"
          echo "ELF file : ${ELF_NAME}"

      - name: Configure CMake
        run: |
          cmake -B build \
                -S pico_sdk_sigrok \
                -G "Unix Makefiles" \
                -DPICO_BOARD=${{ matrix.pico_board }} \
                -DCMAKE_C_FLAGS="-DPICO_MODE=${{ matrix.pico_mode }}" \
                -DPICO_SDK_PATH="${GITHUB_WORKSPACE}/pico-sdk" \
                -DCMAKE_MODULE_PATH="${GITHUB_WORKSPACE}"

      - name: Build firmware
        run: cmake --build build -- -j $(nproc)

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/pico_sdk_sigrok.uf2 "artifacts/${{ steps.meta.outputs.uf2_name }}"
          cp build/pico_sdk_sigrok.elf "artifacts/${{ steps.meta.outputs.elf_name }}"
          echo "--- Staged artifacts ---"
          ls -lh artifacts/

      - name: Upload build artifact (${{ matrix.pico_board }}, mode${{ matrix.pico_mode }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Publish GitHub Release (collects all board × mode artifacts)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./release
          merge-multiple: true

      - name: Add shared files
        run: |
          cp LICENSE ./release/
          cp README.md ./release/
          echo "--- Release files ---"
          ls -lh release/

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "sigrok-pico ${{ needs.build.outputs.version }}"
          files: |
            release/${{ needs.build.outputs.uf2_name }}
            release/${{ needs.build.outputs.elf_name }}
            release/LICENSE
            release/README.md
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft_release == 'true' || false }}
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}
