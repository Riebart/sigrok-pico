# =============================================================================
# .github/workflows/build-firmware.yml
#
# Builds the sigrok-pico ADS1256 firmware and publishes a GitHub Release.
#
# Triggers:
#   • Push a tag like "v1.2.3"  → full build + publish release
#   • Pull request to main      → build-only CI check
#   • Manual workflow_dispatch  → build + publish release with custom inputs
#
# Improvements over v1:
#   • Pico SDK + submodules cached (saves ~200MB clone on repeat runs)
#   • All actions pinned to full commit SHAs (supply-chain security)
#   • concurrency block cancels stale in-progress runs
#   • persist-credentials: false on all checkouts
#   • defaults.run.shell: bash
#   • Exact known output filenames (fail-fast if binary missing)
#   • LICENSE + README.md bundled in release
#   • Auto-generated release notes via softprops/action-gh-release
# =============================================================================

name: Build & Release Firmware

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.1"
      pico_board:
        description: "PICO_BOARD target"
        required: true
        default: "pico"
        type: choice
        options:
          - pico
          - pico_w
          - pico2
      pico_sdk_version:
        description: "Pico SDK version tag"
        required: false
        default: "2.1.1"
      draft_release:
        description: "Publish as draft release?"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PICO_SDK_VERSION: ${{ github.event.inputs.pico_sdk_version || '2.1.1' }}
  PICO_BOARD:       ${{ github.event.inputs.pico_board       || 'pico'  }}
  BUILD_TYPE:       Release

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build firmware
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ github.event.inputs.pico_board || 'pico' }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      version:        ${{ steps.meta.outputs.version }}

    steps:
      # ── Checkout firmware source ──────────────────────────────────────────
      - name: Checkout firmware source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # ── Cache: Pico SDK repo ──────────────────────────────────────────────
      - name: Cache Pico SDK
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        id: pico-sdk-cache
        with:
          path: pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      # ── Cache: Pico SDK submodules (tinyusb, lwIP, etc.) ─────────────────
      - name: Cache Pico SDK submodules
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: pico-sdk/lib
          key: pico-sdk-submodules-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      # ── Checkout Pico SDK (only on cache miss) ────────────────────────────
      - name: Checkout Pico SDK ${{ env.PICO_SDK_VERSION }}
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: raspberrypi/pico-sdk
          ref: ${{ env.PICO_SDK_VERSION }}
          path: pico-sdk
          fetch-depth: 1
          persist-credentials: false

      # ── Init submodules (only on cache miss) ──────────────────────────────
      - name: Initialize Pico SDK submodules
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: cd pico-sdk && git submodule update --init --recursive

      # ── Install toolchain ─────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            build-essential \
            python3

      - name: Verify ARM toolchain
        run: arm-none-eabi-gcc --version

      # ── Copy pico_sdk_import.cmake ────────────────────────────────────────
      - name: Copy pico_sdk_import.cmake
        run: |
          cp pico-sdk/external/pico_sdk_import.cmake \
             pico_sdk_sigrok/pico_sdk_import.cmake

      # ── Resolve version / artifact name ───────────────────────────────────
      - name: Resolve build metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          ARTIFACT="sigrok-pico-ads1256-${VERSION}-${{ env.PICO_BOARD }}"
          echo "version=${VERSION}"        >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      # ── CMake configure ───────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build \
                -S pico_sdk_sigrok \
                -G "Unix Makefiles" \
                -DPICO_BOARD=${{ env.PICO_BOARD }} \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
                -DPICO_SDK_PATH="${GITHUB_WORKSPACE}/pico-sdk"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build firmware
        run: cmake --build build -- -j $(nproc)

      # ── Collect artefacts (explicit names — fails loud if missing) ─────────
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/pico_sdk_sigrok.uf2 artifacts/
          cp build/pico_sdk_sigrok.elf artifacts/
          cp LICENSE                   artifacts/
          cp README.md                 artifacts/
          ls -lh artifacts/

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Publish GitHub Release
  # Only runs on a version tag push OR manual workflow_dispatch
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./release

      - name: Show release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "sigrok-pico ADS1256 ${{ needs.build.outputs.version }}"
          files: |
            release/pico_sdk_sigrok.uf2
            release/pico_sdk_sigrok.elf
            release/LICENSE
            release/README.md
          generate_release_notes: true
          draft:      ${{ github.event.inputs.draft_release == 'true' || false }}
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}
