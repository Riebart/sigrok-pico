# =============================================================================
# .github/workflows/build-firmware.yml
#
# Builds the sigrok-pico ADS1256 firmware and publishes a GitHub Release.
#
# Triggers:
#   • Push a tag like "v1.2.3"  → full build + publish release
#   • Pull request to main      → build-only CI check
#   • Manual workflow_dispatch  → build + publish release with custom inputs
# =============================================================================

name: Build & Release Firmware

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.1"
      pico_board:
        description: "PICO_BOARD target"
        required: true
        default: "pico"
        type: choice
        options:
          - pico
          - pico_w
          - pico2
      pico_sdk_version:
        description: "Pico SDK version tag"
        required: false
        default: "2.1.1"
      draft_release:
        description: "Publish as draft release?"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PICO_SDK_VERSION: ${{ github.event.inputs.pico_sdk_version || '2.1.0' }}
  PICO_BOARD: ${{ github.event.inputs.pico_board       || 'pico'  }}
  BUILD_TYPE: Release

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build firmware
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ github.event.inputs.pico_board || 'pico' }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      version: ${{ steps.meta.outputs.version }}
      uf2_name: ${{ steps.meta.outputs.uf2_name }}
      elf_name: ${{ steps.meta.outputs.elf_name }}

    steps:
      - name: Checkout firmware source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Pico SDK
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: pico-sdk-cache
        with:
          path: pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      - name: Cache Pico SDK submodules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: pico-sdk/lib
          key: pico-sdk-submodules-${{ env.PICO_SDK_VERSION }}-${{ runner.os }}

      - name: Checkout Pico SDK ${{ env.PICO_SDK_VERSION }}
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: raspberrypi/pico-sdk
          ref: ${{ env.PICO_SDK_VERSION }}
          path: pico-sdk
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize Pico SDK submodules
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: cd pico-sdk && git submodule update --init --recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            build-essential \
            python3

      - name: Verify ARM toolchain
        run: arm-none-eabi-gcc --version

      - name: Copy pico_sdk_import.cmake
        run: |
          cp pico-sdk/external/pico_sdk_import.cmake \
             pico_sdk_sigrok/pico_sdk_import.cmake

      # ── Resolve version and compute all output filenames here ─────────────
      - name: Resolve build metadata and filenames
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi

          BOARD="${{ env.PICO_BOARD }}"
          DATE=$(date -u +'%Y-%m-%d')

          # e.g. sigrok-pico-ads1256-v1.0.0-pico-2026-06-28
          BASE="sigrok-pico-ads1256-${VERSION}-${BOARD}-${DATE}"
          UF2_NAME="${BASE}.uf2"
          ELF_NAME="${BASE}.elf"
          ARTIFACT="${BASE}"

          echo "version=${VERSION}"          >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT}"   >> "$GITHUB_OUTPUT"
          echo "uf2_name=${UF2_NAME}"        >> "$GITHUB_OUTPUT"
          echo "elf_name=${ELF_NAME}"        >> "$GITHUB_OUTPUT"

          echo "Version  : ${VERSION}"
          echo "UF2 file : ${UF2_NAME}"
          echo "ELF file : ${ELF_NAME}"

      - name: Configure CMake
        run: |
          cmake -B build \
                -S pico_sdk_sigrok \
                -G "Unix Makefiles" \
                -DPICO_BOARD=${{ env.PICO_BOARD }} \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
                -DPICO_SDK_PATH="${GITHUB_WORKSPACE}/pico-sdk"

      - name: Build firmware
        run: cmake --build build -- -j $(nproc)

      # ── Stage with versioned filenames ────────────────────────────────────
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/pico_sdk_sigrok.uf2  "artifacts/${{ steps.meta.outputs.uf2_name }}"
          cp build/pico_sdk_sigrok.elf  "artifacts/${{ steps.meta.outputs.elf_name }}"
          cp LICENSE                     artifacts/
          cp README.md                   artifacts/
          echo "--- Staged artifacts ---"
          ls -lh artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Publish GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./release

      - name: Show release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "sigrok-pico ADS1256 ${{ needs.build.outputs.version }}"
          files: |
            release/${{ needs.build.outputs.uf2_name }}
            release/${{ needs.build.outputs.elf_name }}
            release/LICENSE
            release/README.md
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft_release == 'true' || false }}
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          token: ${{ secrets.GITHUB_TOKEN }}
