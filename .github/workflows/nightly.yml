# =============================================================================
# .github/workflows/nightly.yml
#
# Nightly pre-release build for working/feature branches.
#
# What it does:
#   • Runs on a cron schedule (02:00 UTC every day) against all "working"
#     branches (anything that is NOT main/develop/release-*).
#   • Can also be triggered manually via workflow_dispatch for any branch.
#   • Skips the run entirely if there have been no new commits since the
#     last nightly build tag (saves runner minutes).
#   • Creates / overwrites a rolling GitHub pre-release tagged
#     "nightly-<branch>-<YYYY-MM-DD>-<short-sha>" so old nightlies are
#     replaced rather than piling up.
#   • Attaches the .uf2 and .elf firmware artefacts to the pre-release.
# =============================================================================

name: Nightly Build

on:
  schedule:
    # 02:00 UTC every day — offset from the top of the hour to avoid
    # GitHub's busy period and the "skipped when overloaded" caveat.
    - cron: "0 2 * * *"

  # Allow any branch to be built on demand from the Actions UI
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (defaults to the repo default branch)"
        required: false
        default: ""
      pico_board:
        description: "PICO_BOARD target"
        required: true
        default: "pico"
        type: choice
        options:
          - pico
          - pico_w
          - pico2
      force_build:
        description: "Build even if no new commits since last nightly?"
        required: false
        default: "false"
        type: boolean

# ─── Global env ──────────────────────────────────────────────────────────────
env:
  PICO_SDK_TAG: "2.1.1"
  PICO_BOARD:   ${{ github.event.inputs.pico_board || 'pico' }}
  BUILD_TYPE:   Release

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Guard: skip if no new commits since last nightly
  # ═══════════════════════════════════════════════════════════════════════════
  check-changes:
    name: Check for new commits
    runs-on: ubuntu-24.04

    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      branch_name:  ${{ steps.check.outputs.branch_name }}
      nightly_tag:  ${{ steps.check.outputs.nightly_tag }}
      short_sha:    ${{ steps.check.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For scheduled runs use the default branch; for dispatch honour input
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0   # full history needed for commit comparison

      - name: Determine build metadata and staleness
        id: check
        env:
          FORCE: ${{ github.event.inputs.force_build || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Resolve branch name ──────────────────────────────────────────
          if [[ -n "${{ github.event.inputs.branch }}" ]]; then
            BRANCH="${{ github.event.inputs.branch }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          # Normalise branch name for use in a tag (replace / with -)
          BRANCH_SLUG="${BRANCH//\//-}"

          DATE=$(date -u +'%Y-%m-%d')
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY_TAG="nightly-${BRANCH_SLUG}-${DATE}-${SHORT_SHA}"

          echo "branch_name=${BRANCH}"        >> "$GITHUB_OUTPUT"
          echo "nightly_tag=${NIGHTLY_TAG}"   >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"       >> "$GITHUB_OUTPUT"

          # ── Skip check ───────────────────────────────────────────────────
          if [[ "${FORCE}" == "true" ]]; then
            echo "Force flag set — building regardless of commit history."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the most recent nightly tag for this branch
          LAST_TAG=$(git tag --list "nightly-${BRANCH_SLUG}-*" \
                       --sort=-version:refname | head -1 || true)

          if [[ -z "${LAST_TAG}" ]]; then
            echo "No previous nightly tag found — first nightly build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Count commits since that tag
          COMMIT_COUNT=$(git rev-list "${LAST_TAG}..HEAD" --count 2>/dev/null || echo "0")
          echo "Commits since last nightly (${LAST_TAG}): ${COMMIT_COUNT}"

          if [[ "${COMMIT_COUNT}" -eq 0 ]]; then
            echo "No new commits — skipping nightly build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found — proceeding with nightly build."
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build firmware
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build nightly firmware
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout firmware source (${{ needs.check-changes.outputs.branch_name }})
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          path: sigrok-pico

      - name: Checkout Pico SDK ${{ env.PICO_SDK_TAG }}
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: ${{ env.PICO_SDK_TAG }}
          path: pico-sdk
          submodules: recursive

      - name: Install ARM cross-compiler & build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            python3 build-essential

      - name: Verify ARM toolchain
        run: arm-none-eabi-gcc --version

      - name: Copy pico_sdk_import.cmake
        run: |
          cp pico-sdk/external/pico_sdk_import.cmake \
             sigrok-pico/pico_sdk_sigrok/pico_sdk_import.cmake

      - name: Set artifact name
        id: meta
        run: |
          TAG="${{ needs.check-changes.outputs.nightly_tag }}"
          ARTIFACT="${TAG}-${{ env.PICO_BOARD }}"
          echo "artifact_name=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: CMake configure
        working-directory: sigrok-pico/pico_sdk_sigrok
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          cmake -B build \
                -DPICO_BOARD=${{ env.PICO_BOARD }} \
                -DPICO_SDK_PATH="${PICO_SDK_PATH}" \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
                -G Ninja

      - name: Build firmware
        working-directory: sigrok-pico/pico_sdk_sigrok
        run: ninja -C build -j$(nproc)

      - name: Stage artefacts
        id: stage
        working-directory: sigrok-pico/pico_sdk_sigrok/build
        run: |
          mkdir -p staging
          find . -name "*.uf2" -exec cp {} staging/ \;
          find . -name "*.elf" -exec cp {} staging/ \;
          ls -lh staging/
          uf2_count=$(find staging -name "*.uf2" | wc -l)
          [[ "${uf2_count}" -gt 0 ]] || { echo "::error::No .uf2 produced!"; exit 1; }

      - name: Upload nightly artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: sigrok-pico/pico_sdk_sigrok/build/staging/
          if-no-files-found: error
          retention-days: 7    # nightlies expire after 1 week

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 — Publish rolling nightly pre-release
  # ═══════════════════════════════════════════════════════════════════════════
  publish-nightly:
    name: Publish nightly pre-release
    needs: [check-changes, build]
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout (for tag operations)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Configure Git identity for tagging
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download nightly artefact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: release-files/

      - name: Show release files
        run: ls -lh release-files/

      # Delete any existing nightly pre-release for the same branch+date
      # so we always have exactly ONE rolling nightly per branch per day.
      - name: Delete stale nightly release (same branch, same date)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_SLUG="${{ needs.check-changes.outputs.branch_name }}"
          BRANCH_SLUG="${BRANCH_SLUG//\//-}"
          DATE=$(date -u +'%Y-%m-%d')
          PATTERN="nightly-${BRANCH_SLUG}-${DATE}-"

          # List all releases and delete any that match today's pattern
          gh release list --limit 50 --json tagName \
            --jq ".[].tagName" 2>/dev/null | \
          grep "^${PATTERN}" | \
          while read -r OLD_TAG; do
            echo "Deleting stale nightly release: ${OLD_TAG}"
            gh release delete "${OLD_TAG}" --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Generate nightly release notes
        run: |
          BRANCH="${{ needs.check-changes.outputs.branch_name }}"
          SHA="${{ needs.check-changes.outputs.short_sha }}"
          DATE=$(date -u +'%Y-%m-%d')
          TAG="${{ needs.check-changes.outputs.nightly_tag }}"

          cat << NOTES > release_notes.md
          ## 🌙 Nightly Build — ${DATE}

          > **Pre-release** — compiled from the \`${BRANCH}\` working branch.
          > Not intended for production use. Overwritten daily.

          **Branch:** [\`${BRANCH}\`](https://github.com/${{ github.repository }}/tree/${BRANCH})
          **Commit:** [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Board:** \`${{ env.PICO_BOARD }}\`
          **Pico SDK:** \`${{ env.PICO_SDK_TAG }}\`

          ### Files
          | File | Description |
          |---|---|
          | \`*.uf2\` | Drag-and-drop onto Pico in BOOTSEL mode |
          | \`*.elf\` | Debug binary for OpenOCD / GDB |

          ### Flashing
          1. Hold **BOOTSEL**, plug in USB → drive **RPI-RP2** appears
          2. Copy \`.uf2\` to the drive — Pico reboots automatically

          ---
          *This release is automatically overwritten on the next nightly build for \`${BRANCH}\`.*
          NOTES

      - name: Create nightly pre-release
        uses: ncipollo/release-action@v1
        with:
          tag:          ${{ needs.check-changes.outputs.nightly_tag }}
          name:         "🌙 Nightly · ${{ needs.check-changes.outputs.branch_name }} · ${{ needs.check-changes.outputs.short_sha }}"
          bodyFile:     release_notes.md
          artifacts:    "release-files/*"
          artifactErrorsFailBuild: true
          prerelease:   true
          draft:        false
          allowUpdates: true
          token:        ${{ secrets.GITHUB_TOKEN }}

      # Push the nightly tag so the "no new commits" guard works next time
      - name: Push nightly tag
        run: |
          git tag "${{ needs.check-changes.outputs.nightly_tag }}" \
                  --force 2>/dev/null || true
          git push origin "${{ needs.check-changes.outputs.nightly_tag }}" \
                  --force 2>/dev/null || true
